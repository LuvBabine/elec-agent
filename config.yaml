llm:
  provider: ollama          # ollama | openai | anthropic
  model: llama3.2-vision    # vision-capable model required for image input
  api_key: null             # required for openai/anthropic

rules:
  standard: NFC15100
  strictness: normal        # normal | strict

output:
  format: pdf               # pdf | txt | json
  language: fr              # fr | en
